name: Check for feishu-deb updates

on:
  schedule:
    # 每天 UTC 8:00 检查一次（北京时间 16:00）
    - cron: '0 8 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch AUR PKGBUILD for feishu-bin
        run: |
          curl -sL 'https://aur.archlinux.org/cgit/aur.git/plain/PKGBUILD?h=feishu-bin' -o /tmp/aur-pkgbuild
          echo "=== AUR PKGBUILD ==="
          cat /tmp/aur-pkgbuild

      - name: Extract variables from AUR PKGBUILD
        id: aur_vars
        run: |
          # Source the PKGBUILD to extract variables (in a subshell to avoid pollution)
          bash -c '
            source /tmp/aur-pkgbuild 2>/dev/null
            echo "pkgver=${pkgver}"
            echo "pkghash_x64=${_pkghash_x64}"
            echo "pkghash_arm64=${_pkghash_arm64}"
            echo "sha256_x86_64=${sha256sums_x86_64[@]}"
            echo "sha256_aarch64=${sha256sums_aarch64[@]}"
          ' > /tmp/aur-vars.txt

          cat /tmp/aur-vars.txt

          # Read into step outputs
          {
            echo "pkgver=$(grep '^pkgver=' /tmp/aur-vars.txt | cut -d= -f2-)"
            echo "pkghash_x64=$(grep '^pkghash_x64=' /tmp/aur-vars.txt | cut -d= -f2-)"
            echo "pkghash_arm64=$(grep '^pkghash_arm64=' /tmp/aur-vars.txt | cut -d= -f2-)"
            echo "sha256_x86_64=$(grep '^sha256_x86_64=' /tmp/aur-vars.txt | cut -d= -f2-)"
            echo "sha256_aarch64=$(grep '^sha256_aarch64=' /tmp/aur-vars.txt | cut -d= -f2-)"
          } >> "$GITHUB_OUTPUT"

      - name: Get current version from pacscript
        id: current_vars
        run: |
          PACSCRIPT="packages/feishu-deb/feishu-deb.pacscript"
          {
            echo "pkgver=$(grep '^pkgver=' "$PACSCRIPT" | cut -d= -f2 | tr -d '"'"'"'"'"'"'")"
            echo "pkghash_x86_64=$(grep '^_pkghash_x86_64=' "$PACSCRIPT" | cut -d= -f2 | tr -d '"'"'"'"'"'"'")"
            echo "sha256_amd64=$(grep '^sha256sums_amd64=' "$PACSCRIPT" | cut -d= -f2 | tr -d '()'"'"'"'"'"'"'"'"'"'"'"'" | cut -d'"'"'"'"'"'"'"' -f2)"
          } >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: compare
        run: |
          echo "AUR version: ${{ steps.aur_vars.outputs.pkgver }}"
          echo "Pacscript version: ${{ steps.current_vars.outputs.pkgver }}"

          if [ "${{ steps.aur_vars.outputs.pkgver }}" = "${{ steps.current_vars.outputs.pkgver }}" ] \
             && [ "${{ steps.aur_vars.outputs.pkghash_x64 }}" = "${{ steps.current_vars.outputs.pkghash_x86_64 }}" ]; then
            echo "No update needed"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Update available!"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update pacscript
        if: steps.compare.outputs.changed == 'true'
        run: |
          PACSCRIPT="packages/feishu-deb/feishu-deb.pacscript"
          AUR_VER="${{ steps.aur_vars.outputs.pkgver }}"
          HASH_X64="${{ steps.aur_vars.outputs.pkghash_x64 }}"
          HASH_ARM64="${{ steps.aur_vars.outputs.pkghash_arm64 }}"
          SHA256_X86="${{ steps.aur_vars.outputs.sha256_x86_64 }}"
          SHA256_ARM="${{ steps.aur_vars.outputs.sha256_aarch64 }}"

          # Remove quotes from AUR values (AUR PKGBUILD uses single quotes)
          HASH_X64="${HASH_X64//\'/}"
          HASH_ARM64="${HASH_ARM64//\'/}"
          SHA256_X86="${SHA256_X86//\'/}"
          SHA256_ARM="${SHA256_ARM//\'/}"

          echo "Updating to version: $AUR_VER"
          echo "Hash x64: $HASH_X64"
          echo "Hash arm64: $HASH_ARM64"

          # Update pkgver
          sed -i "s/^pkgver=\".*\"/pkgver=\"${AUR_VER}\"/" "$PACSCRIPT"

          # Update pkghash values
          sed -i "s/^_pkghash_x86_64=\".*\"/_pkghash_x86_64=\"${HASH_X64}\"/" "$PACSCRIPT"
          sed -i "s/^_pkghash_arm64=\".*\"/_pkghash_arm64=\"${HASH_ARM64}\"/" "$PACSCRIPT"

          # Update sha256sums
          sed -i "s/^sha256sums_amd64=(\".*\")/sha256sums_amd64=(\"${SHA256_X86}\")/" "$PACSCRIPT"
          sed -i "s/^sha256sums_arm64=(\".*\")/sha256sums_arm64=(\"${SHA256_ARM}\")/" "$PACSCRIPT"

          echo "=== Updated pacscript ==="
          cat "$PACSCRIPT"

      - name: Regenerate .SRCINFO and packagelist
        if: steps.compare.outputs.changed == 'true'
        run: |
          bash scripts/srcinfo.sh add feishu-deb

      - name: Create Pull Request
        if: steps.compare.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update feishu-deb to ${{ steps.aur_vars.outputs.pkgver }}"
          title: "upd: feishu-deb to ${{ steps.aur_vars.outputs.pkgver }}"
          body: |
            ## 自动更新

            检测到 AUR 中 feishu-bin 已更新到 **${{ steps.aur_vars.outputs.pkgver }}**

            - [x] Update pkgver
            - [x] Update download hashes
            - [x] Regenerate .SRCINFO
            - [x] Update packagelist

            请 review 并合并。
          branch: auto-update/feishu-deb-${{ steps.aur_vars.outputs.pkgver }}
          base: master
          labels: automated
